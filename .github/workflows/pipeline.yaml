name: Deploy to Contabo

on:
  push:
    branches: [ main ]

permissions:
  contents: write

env:
  DOCKER_REPO: mrfuntor
  DOCKER_IMAGE_NAME: devops-bootcamp-linker-backend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    outputs:
      image-tag: ${{ steps.meta.outputs.version }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_REPO }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Generate Docker Image Tag
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REPO }}/${{ env.DOCKER_IMAGE_NAME }}
          tags: |
            type=sha

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max


  deploy-to-gitops:
    needs: build-and-deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Update Deployment Image
        run: |
          yq -i '.spec.template.spec.containers[0].image = "${{ env.DOCKER_REPO }}/${{ env.DOCKER_IMAGE_NAME }}:${{ needs.build-and-deploy.outputs.image-tag }}"' k8s/deployment.yaml

      - name: Commit and Push Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add k8s/deployment.yaml

          git commit -m "chore: update backend image to ${{ needs.build-and-deploy.outputs.image-tag }}" || echo "No changes to commit"

          git push