name: Deploy to Contabo
on:
  push:
    branches: [ main ]

env:
  DOCKER_REPO: mrfuntor
  DOCKER_IMAGE_NAME: devops-bootcamp-linker-backend

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_REPO }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Generate DockerImage Tag
        id: tag
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REPO }}/${{ env.DOCKER_IMAGE_NAME }}
          tags: |
            type=sha,format=short

      - name: Build and Push Docker Image to Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.tag.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
    outputs:
      image-tag: ${{ steps.tag.outputs.version }}

  deploy-to-contabo:
    needs: build-and-deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout K8s Manifests
        uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v3

      - name: Set Kubernetes Context
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG }}

      - name: Update Deployment Image
        run: |
          # Dynamically swap the placeholder image with the new SHA-tagged image
          sed -i "s|image: ${{ env.DOCKER_REPO }}/${{ env.DOCKER_IMAGE_NAME }}:.*|image: ${{ env.DOCKER_REPO }}/${{ env.DOCKER_IMAGE_NAME }}:${{ needs.build-and-deploy.outputs.image-tag }}|g" k8s/deployment.yaml

      - name: Deploy to MicroK8s
        run: |
          kubectl apply -f k8s/

      - name: Verify Deployment
        run: |
          kubectl rollout status deployment/backend-deployment -n linker-app