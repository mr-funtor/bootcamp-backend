# -------------------------------------------------
# PIPELINE NAME
# -------------------------------------------------
name: Docker Build, Scan and Push Pipeline (Backend)

# -------------------------------------------------
# TRIGGERS
# -------------------------------------------------
on:
  push:
    branches:
      - main
    paths-ignore:
      - '.github/workflows/**'
      - '**/*.md'
  workflow_dispatch:

# -------------------------------------------------
# GLOBAL VARIABLES
# -------------------------------------------------
env:
  DOCKER_REPO: mrfuntor
  DOCKER_IMAGE_NAME: devops-bootcamp-linker-backend

# -------------------------------------------------
# JOBS
# -------------------------------------------------
jobs:
  # -------------------------------------------------
  # JOB 1: Notify Slack that pipeline started
  # -------------------------------------------------
  notify-slack-start:
    runs-on: ubuntu-latest
    steps:
      - name: Send Slack Notification - Pipeline Started
        continue-on-error: true
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_TITLE: "🚀 Docker Build, Scan and Push Pipeline Started"
          SLACK_MESSAGE: "🚀 Docker Build, Scan and Push Pipeline has started for commit `${{ github.sha }}` on branch `${{ github.ref_name }}`."
          SLACK_COLOR: "#36a64f"

  # -------------------------------------------------
  # JOB 2: Build, Scan and Push Docker Image
  # -------------------------------------------------
  build-and-scan:
    needs: notify-slack-start
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      # -------------------------------------------------
      # STEP 1: Checkout Repository
      # -------------------------------------------------
      - name: Checkout Repository
        uses: actions/checkout@v4

      # -------------------------------------------------
      # STEP 2: Setup Docker Buildx
      # -------------------------------------------------
      - name: Set up Docker
        uses: docker/setup-buildx-action@v3

      # -------------------------------------------------
      # STEP 3: Login to Docker Hub
      # -------------------------------------------------
      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ env.DOCKER_REPO }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # -------------------------------------------------
      # STEP 4: Generate Image Tag (Commit SHA)
      # -------------------------------------------------
      - name: Generate DockerImage Tag
        id: tag
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.DOCKER_REPO }}/${{ env.DOCKER_IMAGE_NAME }}
          tags: |
            type=sha,format=short

      # -------------------------------------------------
      # STEP 5: Build Docker Image
      # -------------------------------------------------
      - name: Build Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true
          tags: ${{ steps.tag.outputs.tags }}

      # -------------------------------------------------
      # STEP 6: Install Trivy Security Scanner
      # -------------------------------------------------
      - name: Install Trivy Security Scanner
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

      # -------------------------------------------------
      # STEP 7: Scan Docker Image for Vulnerabilities
      # -------------------------------------------------
      - name: Scan Docker Image for Vulnerabilities
        run: |
          trivy image --format table --exit-code 1 --ignore-unfixed --severity HIGH,CRITICAL ${{ steps.tag.outputs.tags }} | tee trivy-report.txt

      # -------------------------------------------------
      # STEP 8: Upload Scan Report
      # -------------------------------------------------
      - name: Upload Trivy Scan Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-scan-report
          path: trivy-report.txt

      # -------------------------------------------------
      # STEP 9: Push Docker Image to Docker Hub
      # -------------------------------------------------
      - name: Push Docker Image to Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.tag.outputs.tags }}

      # -------------------------------------------------
      # STEP 10: Final Slack Notification
      # -------------------------------------------------
      - name: Send Slack Notification - Pipeline Completed
        continue-on-error: true
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_TITLE: "✅ Docker Build, Scan and Push Pipeline Completed"
          SLACK_MESSAGE: "✅ Docker Build, Scan and Push Pipeline has completed for commit `${{ github.sha }}` on branch `${{ github.ref_name }}`. Image tagged as `${{ steps.tag.outputs.tags }}`."
          SLACK_COLOR: "#36a64f"