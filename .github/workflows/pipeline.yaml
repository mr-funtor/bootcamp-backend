name: Build and Deploy (ArgoCD)

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'k8s/deployment.yaml'

permissions:
  contents: write

env:
  DOCKER_REPO: mrfuntor
  DOCKER_IMAGE_NAME: devops-bootcamp-linker-backend

jobs:
  build:
    runs-on: ubuntu-latest

    outputs:
      image-tag: ${{ steps.tag.outputs.tag }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Docker
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKER_REPO }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Generate Image Tag
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKER_REPO }}/${{ env.DOCKER_IMAGE_NAME }}
          tags: |
            type=sha,format=short

      - name: Extract Tag
        id: tag
        run: |
          echo "tag=$(echo '${{ steps.meta.outputs.tags }}' | head -n 1 | awk -F':' '{print $2}')" >> $GITHUB_OUTPUT

      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}


  deploy-gitops:
    needs: build
    runs-on: ubuntu-latest
    if: github.actor != 'github-actions[bot]'

    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup yq
        uses: mikefarah/yq@v4

      - name: Update Image in Deployment YAML
        run: |
          yq -i '.spec.template.spec.containers[0].image = "${{ env.DOCKER_REPO }}/${{ env.DOCKER_IMAGE_NAME }}:${{ needs.build.outputs.image-tag }}"' k8s/deployment.yaml

      - name: Commit and Push Update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add k8s/deployment.yaml

          git commit -m "chore: update backend image to ${{ needs.build.outputs.image-tag }}" || echo "No changes"

          git push origin HEAD:main