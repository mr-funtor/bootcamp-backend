apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: linker-backend-project
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'https://github.com/mr-funtor/bootcamp-backend'
    targetRevision: HEAD
    path: 'k8s' # Point this EXACTLY to your existing k8s folder
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: linker-app #namespace your project uses
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true