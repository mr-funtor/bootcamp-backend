apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: linker-ingress
  namespace: linker-app
  annotations:
    kubernetes.io/ingress.class: traefik
    cert-manager.io/cluster-issuer: "linker-issuer" # the name of the ClusterIssuer you created
spec:
  ingressClassName: public
  tls:
  - hosts:
    - charlesmonroe.online
    - api.charlesmonroe.online
    secretName: linker-tls-cert
  rules:
  - host: api.charlesmonroe.online
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: linker-backend-service
            port:
              number: 80
  - host: charlesmonroe.online
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: linker-app-service
            port:
              number: 80
