apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: linker-ingress
  namespace: linker-app
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: public
  rules:
  - http:
      paths:
      # Frontend
      - path: /api/check
        pathType: Exact
        backend:
          service:
            name: linker-app-service
            port:
              number: 80
      # Backend API
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: linker-backend-service
            port:
              number: 80
      # Frontend catch-all route
      - path: /
        pathType: Prefix
        backend:
          service:
            name: linker-app-service
            port:
              number: 80